# AI-GUI Skill

让 AI 看懂屏幕，用自然语言控制电脑。

## 快速开始

```bash
# 安装依赖
pip install -r requirements.txt

# 使用
python ai_gui_simple.py click "登录按钮"
```

## 核心特性

- 🎯 **AI 视觉识别** - 说"登录按钮"就能找到
- 🤝 **人机协同** - 不确定时询问用户
- 📊 **数据驱动** - 可选标注收集，越用越聪明
- ✨ **简洁设计** - 100 行代码，5 分钟上手

## 标注系统（可选）

默认关闭标注收集。启用：

```bash
AI_GUI_ANNOTATION=true python ai_gui_simple.py click "按钮"
```

详情见 [ANNOTATION_DESIGN.md](ANNOTATION_DESIGN.md)

## 隐私保护

- ✅ 默认关闭标注
- ✅ 数据本地存储
- ✅ 用户完全控制
- ✅ 可随时删除

---

_简洁而不简单，智能而透明_ 🦞
